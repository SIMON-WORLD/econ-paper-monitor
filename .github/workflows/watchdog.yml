name: Monitor Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: paper-monitor-watchdog
  cancel-in-progress: true

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check monitor freshness
        id: freshness
        shell: bash
        run: |
          DECISION="$(python scripts/should_dispatch_monitor.py --light-min-minutes 50 --full-after-hour 8 --full-after-minute 30)"
          echo "decision=$DECISION" >> "$GITHUB_OUTPUT"
          echo "Monitor freshness: $DECISION"
      - name: Check active monitor run
        id: active
        if: steps.freshness.outputs.decision == 'light' || steps.freshness.outputs.decision == 'full'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          IN_PROGRESS="$(gh run list --repo "${{ github.repository }}" --workflow update.yml --status in_progress --json databaseId --jq 'length')"
          QUEUED="$(gh run list --repo "${{ github.repository }}" --workflow update.yml --status queued --json databaseId --jq 'length')"
          WAITING="$(gh run list --repo "${{ github.repository }}" --workflow update.yml --status waiting --json databaseId --jq 'length')"
          ACTIVE=$((IN_PROGRESS + QUEUED + WAITING))
          echo "count=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "Active Update Paper Monitor runs: $ACTIVE"
      - name: Dispatch monitor update
        if: steps.freshness.outputs.decision == 'light' && steps.active.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run update.yml \
            --repo "${{ github.repository }}" \
            -f mode=light \
            -f days=14
      - name: Dispatch full monitor update
        if: steps.freshness.outputs.decision == 'full' && steps.active.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run update.yml \
            --repo "${{ github.repository }}" \
            -f mode=full \
            -f days=45
      - name: Skip active monitor
        if: (steps.freshness.outputs.decision == 'light' || steps.freshness.outputs.decision == 'full') && steps.active.outputs.count != '0'
        run: echo "An update workflow is already active; watchdog dispatch skipped."
      - name: Skip fresh monitor
        if: startsWith(steps.freshness.outputs.decision, 'skip:')
        run: echo "Recent light monitor exists; watchdog dispatch skipped."
