name: Update Paper Monitor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: light, full, or single"
        required: false
        default: "light"
      journal:
        description: "Journal id for mode=single"
        required: false
        default: ""
      days:
        description: "Crossref lookback days"
        required: false
        default: "14"
  schedule:
    # GitHub often delays or drops jobs scheduled at minute 0 during peak load.
    # Run the hourly light monitor at minute 7 for better reliability.
    - cron: "7 * * * *"
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Resolve run mode
        id: mode
        shell: bash
        run: |
          MODE="${{ github.event.inputs.mode || 'light' }}"
          DAYS="${{ github.event.inputs.days || '14' }}"
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 0 * * *" ]; then
            MODE="full"
            DAYS="45"
          fi
          ROWS="12"
          DETAIL_LIMIT="0"
          CN_DETAIL_LIMIT="0"
          TRANSLATE_LIMIT="80"
          TRANSLATE_SECONDS="180"
          TIER="hourly"
          if [ "$MODE" = "full" ]; then
            ROWS="40"
            DETAIL_LIMIT="120"
            CN_DETAIL_LIMIT="0"
            TRANSLATE_LIMIT="160"
            TRANSLATE_SECONDS="240"
            TIER=""
          fi
          if [ "$MODE" = "single" ]; then
            ROWS="60"
            DETAIL_LIMIT="25"
            TRANSLATE_LIMIT="80"
            TRANSLATE_SECONDS="180"
            TIER=""
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "days=$DAYS" >> "$GITHUB_OUTPUT"
          echo "rows=$ROWS" >> "$GITHUB_OUTPUT"
          echo "detail_limit=$DETAIL_LIMIT" >> "$GITHUB_OUTPUT"
          echo "cn_detail_limit=$CN_DETAIL_LIMIT" >> "$GITHUB_OUTPUT"
          echo "translate_limit=$TRANSLATE_LIMIT" >> "$GITHUB_OUTPUT"
          echo "translate_seconds=$TRANSLATE_SECONDS" >> "$GITHUB_OUTPUT"
          echo "tier=$TIER" >> "$GITHUB_OUTPUT"
      - name: Build source registry
        run: python scripts/build_source_registry.py
      - name: Enrich journals
        if: steps.mode.outputs.mode == 'full'
        run: python scripts/enrich_journals.py --rows 3 --timeout 8 --sleep 0.05
      - name: Fetch RSS feeds
        if: steps.mode.outputs.mode != 'full'
        run: python scripts/fetch_rss.py --tier "${{ steps.mode.outputs.tier }}"
      - name: Discover and fetch RSS feeds
        if: steps.mode.outputs.mode == 'full'
        run: python scripts/fetch_rss.py --discover
      - name: Fetch Crossref metadata
        if: steps.mode.outputs.mode != 'single'
        run: python scripts/fetch_crossref.py --tier "${{ steps.mode.outputs.tier }}" --days ${{ steps.mode.outputs.days }} --rows ${{ steps.mode.outputs.rows }} --sleep 0.1 --timeout 12 --retries 2
      - name: Fetch Crossref metadata for one journal
        if: steps.mode.outputs.mode == 'single' && github.event.inputs.journal != ''
        run: python scripts/fetch_crossref.py --only "${{ github.event.inputs.journal }}" --days ${{ steps.mode.outputs.days }} --rows ${{ steps.mode.outputs.rows }} --sleep 0.1 --timeout 12 --retries 2
      - name: Fetch Chinese journal pages
        shell: bash
        run: |
          DATE="$(TZ=Asia/Shanghai date +%F)"
          mkdir -p data/raw/cn
          for JOURNAL in \
            journal-f69300dae2 \
            journal-679eaa2a0c \
            journal-ba9f46c919 \
            journal-379b4022ce \
            journal-bf2aa9381f \
            journal-edcb877d78
          do
            echo "Fetching Chinese journal: $JOURNAL"
            timeout 75s python scripts/fetch_cn_journals.py \
              --tier "${{ steps.mode.outputs.tier }}" \
              --only "$JOURNAL" \
              --output "data/raw/cn/${DATE}-${JOURNAL}.json" \
              --detail-limit ${{ steps.mode.outputs.cn_detail_limit }} \
              || echo "::warning::Chinese journal fetch timed out or failed: $JOURNAL"
          done
      - name: Aggregate Chinese journal status
        run: python scripts/aggregate_cn_status.py
      - name: Dedupe new papers
        run: python scripts/dedupe.py
      - name: Clean Chinese journal noise
        run: python scripts/clean_cn_noise.py
      - name: Apply manual overrides
        run: python scripts/apply_overrides.py
      - name: Normalize daily records
        run: python scripts/normalize_records.py
      - name: Enrich publisher detail pages
        if: steps.mode.outputs.detail_limit != '0'
        run: python scripts/enrich_metadata.py --limit ${{ steps.mode.outputs.detail_limit }} --timeout 12
      - name: Enrich China relevance
        run: python scripts/enrich_china_relevance.py
      - name: Resolve China relevance candidates with AI
        run: python scripts/ai_china_relevance.py --limit 30
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      - name: Translate paper titles
        run: python scripts/translate.py --limit ${{ steps.mode.outputs.translate_limit }} --max-seconds ${{ steps.mode.outputs.translate_seconds }} --timeout 25 --sleep 0.05
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      - name: Record workflow context
        run: python scripts/record_run_context.py --mode "${{ steps.mode.outputs.mode }}" --event "${{ github.event_name }}" --schedule "${{ github.event.schedule }}" --run-id "${{ github.run_id }}" --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      - name: Render static site
        run: python scripts/render_site.py
      - name: Build RSS feed
        run: python scripts/build_feed.py --site-url https://simon-world.github.io/econ-paper-monitor/
      - name: Render local/admin status artifact
        run: python scripts/render_local_status.py
      - name: Write run summary
        run: python scripts/action_summary.py
      - name: Commit generated updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          git diff --cached --quiet || git commit -m "Update paper monitor"
          git push
