# Working paper and policy paper sources.
# stage:
#   1 = first-batch priority sources
#   2 = second-batch priority sources
# Fetchers only collect public metadata. They do not bulk-download PDFs.
sources:
  - id: nber
    title: NBER Working Papers
    chinese_name: 美国国家经济研究局工作论文
    type: working_paper
    stage: 1
    homepage: https://www.nber.org/papers
    url_pattern: "/papers/w\\d+"
    url_contains:
      - /papers/w
    fields:
      - general
      - macro
      - finance
      - labor
      - health
      - trade

  - id: iza
    title: IZA Discussion Papers
    chinese_name: IZA 讨论论文
    type: working_paper
    stage: 1
    homepage: https://www.iza.org/publications/dp
    url_pattern: "/publications/dp/\\d+/"
    url_contains:
      - /publications/dp/
    fields:
      - labor
      - education
      - health
      - development

  - id: world-bank-prwp
    title: World Bank Policy Research Working Papers
    chinese_name: 世界银行政策研究工作论文
    type: policy_paper
    stage: 1
    homepage: https://openknowledge.worldbank.org/collections/8a7a2f5a-73af-5c1f-9f6d-7a60e34d65b5
    url_pattern: "/entities/publication/"
    url_contains:
      - /entities/publication/
    fields:
      - development
      - trade
      - environment
      - public

  - id: imf-working-papers
    title: IMF Working Papers
    chinese_name: IMF 工作论文
    type: policy_paper
    stage: 1
    homepage: https://ideas.repec.org/s/imf/imfwpa.html
    official_homepage: https://www.imf.org/en/Publications/WP
    url_pattern: "/p/imf/imfwpa/"
    url_contains:
      - /p/imf/imfwpa/
    fields:
      - macro
      - finance
      - public
      - trade

  - id: repec-nep
    title: RePEc NEP New Economics Papers
    chinese_name: RePEc NEP 新经济学论文
    type: aggregator
    stage: 3
    homepage: https://nep.repec.org/
    fields:
      - general

  - id: repec-nep-cna
    title: RePEc NEP China
    chinese_name: RePEc NEP 中国经济学论文
    type: aggregator
    stage: 2
    homepage: https://nep.repec.org/nep-cna.html
    access_note: NEP 聚合源，优先用于发现与中国相关的工作论文；发布日期以 NEP issue 或 RePEc 页面为准
    url_pattern: "https://ideas\\.repec\\.org/p/"
    url_contains:
      - https://ideas.repec.org/p/
      - https://econpapers.repec.org/RePEc:
    fields:
      - general
      - development
      - trade

  - id: repec-nep-dev
    title: RePEc NEP Development
    chinese_name: RePEc NEP 发展经济学论文
    type: aggregator
    stage: 2
    homepage: https://nep.repec.org/nep-dev.html
    access_note: NEP 发展经济学细分类，噪声低于全量 NEP
    url_pattern: "https://ideas\\.repec\\.org/p/"
    url_contains:
      - https://ideas.repec.org/p/
      - https://econpapers.repec.org/RePEc:
    fields:
      - development
      - public

  - id: repec-nep-hea
    title: RePEc NEP Health Economics
    chinese_name: RePEc NEP 健康经济学论文
    type: aggregator
    stage: 2
    homepage: https://nep.repec.org/nep-hea.html
    access_note: NEP 健康经济学细分类，作为 SSRN Health Economics Network 的公开替代入口之一
    url_pattern: "https://ideas\\.repec\\.org/p/"
    url_contains:
      - https://ideas.repec.org/p/
      - https://econpapers.repec.org/RePEc:
    fields:
      - health
      - labor
      - public

  - id: repec-nep-mac
    title: RePEc NEP Macroeconomics
    chinese_name: RePEc NEP 宏观经济学论文
    type: aggregator
    stage: 2
    homepage: https://nep.repec.org/nep-mac.html
    access_note: NEP 宏观经济学细分类，覆盖部分未进机构工作论文页的 RePEc 新稿
    url_pattern: "https://ideas\\.repec\\.org/p/"
    url_contains:
      - https://ideas.repec.org/p/
      - https://econpapers.repec.org/RePEc:
    fields:
      - macro
      - finance

  - id: repec-nep-ifn
    title: RePEc NEP International Finance
    chinese_name: RePEc NEP 国际金融论文
    type: aggregator
    stage: 2
    homepage: https://nep.repec.org/nep-ifn.html
    access_note: NEP 国际金融细分类，用于补充 IMF/BIS/OECD 之外的宏观金融工作论文
    url_pattern: "https://ideas\\.repec\\.org/p/"
    url_contains:
      - https://ideas.repec.org/p/
      - https://econpapers.repec.org/RePEc:
    fields:
      - finance
      - macro
      - trade

  - id: ssrn-economics-research-network
    title: SSRN Economics Research Network
    chinese_name: SSRN 经济学研究网络
    type: aggregator
    stage: 3
    homepage: https://papers.ssrn.com/sol3/DisplayJournalBrowse.cfm
    access_note: public pages often return access limits; prefer email/feed integration when available
    url_pattern: "/sol3/papers\\.cfm\\?abstract_id=\\d+"
    url_contains:
      - /sol3/papers.cfm?abstract_id=
    fields:
      - general
      - macro
      - finance
      - labor
      - trade

  - id: ssrn-health-economics-network
    title: SSRN Health Economics Network
    chinese_name: SSRN 健康经济学网络
    type: aggregator
    stage: 3
    homepage: https://papers.ssrn.com/sol3/DisplayJournalBrowse.cfm
    access_note: public pages often return access limits; prefer email/feed integration when available
    url_pattern: "/sol3/papers\\.cfm\\?abstract_id=\\d+"
    url_contains:
      - /sol3/papers.cfm?abstract_id=
    fields:
      - health
      - public
      - labor

  - id: cepr-dp
    title: CEPR Discussion Papers
    chinese_name: CEPR 讨论论文
    type: working_paper
    stage: 2
    homepage: https://cepr.org/publications/discussion-papers
    url_pattern: "/publications/dp\\d+"
    url_contains:
      - /publications/dp
    fields:
      - macro
      - finance
      - trade
      - development

  - id: cesifo-working-papers
    title: CESifo Working Papers
    chinese_name: CESifo 工作论文
    type: working_paper
    stage: 2
    homepage: https://ideas.repec.org/s/ces/ceswps.html
    url_pattern: "/p/ces/ceswps/"
    url_contains:
      - /p/ces/ceswps/
    fields:
      - public
      - labor
      - trade
      - macro

  - id: fed-feds
    title: Federal Reserve FEDS Working Papers
    chinese_name: 美联储 FEDS 工作论文
    type: working_paper
    stage: 2
    homepage: https://www.federalreserve.gov/econres/feds/index.htm
    url_pattern: "/econres/feds/.+\\.htm"
    url_contains:
      - /econres/feds/
    fields:
      - macro
      - finance
      - labor

  - id: bis-working-papers
    title: BIS Working Papers
    chinese_name: 国际清算银行工作论文
    type: working_paper
    stage: 2
    homepage: https://www.bis.org/list/wpapers/index.htm
    feed: https://www.bis.org/doclist/rss_all_categories.rss
    url_pattern: "/publ/work\\d+"
    url_contains:
      - /publ/work
    fields:
      - finance
      - macro

  - id: oecd-working-papers
    title: OECD Working Papers
    chinese_name: OECD 工作论文
    type: policy_paper
    stage: 2
    homepage: https://ideas.repec.org/s/oec/ecoaaa.html
    official_homepage: https://www.oecd-ilibrary.org/economics/oecd-economics-department-working-papers_18151973
    url_pattern: "/p/oec/ecoaaa/"
    url_contains:
      - /p/oec/ecoaaa/
    fields:
      - public
      - macro
      - labor
      - environment

  - id: voxeu-cepr-columns
    title: VoxEU / CEPR Columns
    chinese_name: VoxEU / CEPR 专栏
    type: policy_commentary
    stage: 3
    homepage: https://cepr.org/voxeu
    access_note: 不是严格工作论文，先列入评估池；若后续需要追踪政策评论，可单独建栏目
    fields:
      - macro
      - trade
      - development

  - id: brookings-economic-studies
    title: Brookings Economic Studies
    chinese_name: Brookings 经济研究
    type: policy_commentary
    stage: 3
    homepage: https://www.brookings.edu/center/economic-studies/
    access_note: 政策研究/评论源，先评估 RSS/API 稳定性，不混入工作论文主流
    fields:
      - macro
      - public
      - labor

  - id: iza-newsroom
    title: IZA Newsroom
    chinese_name: IZA 新闻室
    type: policy_commentary
    stage: 3
    homepage: https://www.iza.org/newsroom
    access_note: 用于发现 IZA 新发布动态；正式论文仍以 IZA Discussion Papers 为准
    fields:
      - labor
      - education
